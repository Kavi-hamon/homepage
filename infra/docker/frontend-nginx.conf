server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # In production builds, the Angular app uses same-origin routing for API + OAuth.
  # Docker Compose runs the Go API as the `api` service on the same network, so
  # proxy these paths to keep everything on one origin (port 4200 on the host).
  location /api/ {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /auth/ {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Angular SPA routing fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively.
  location ~* \.(?:css|js|mjs|svg|ico|png|jpg|jpeg|gif|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }
}
